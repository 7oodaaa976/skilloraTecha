<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Skillora</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="icon" type="image/svg+xml" href="skillora-logo.svg" />
  </head>
  <body>
    <nav class="site-header site-header--solid">
      <div class="wrapper site-header__inner">
        <a href="index.html" class="site-header__brand">
          <img src="skillora-logo.svg" alt="Skillora Logo" />
        </a>
      </div>
    </nav>

    <header class="page-hero">
      <div class="wrapper">
        <h1>Contact Us</h1>
        <p>We’d love to hear from you.</p>
      </div>
    </header>

    <section class="section-space">
      <div class="wrapper contact-box">
        <form class="contact-form-grid" action="https://formspree.io/f/myyrqerl" method="POST">
          <input type="text" name="name" placeholder="Your Name" required />
          <input type="email" name="email" placeholder="Your Email" required />
          <textarea name="message" placeholder="Your Message" required></textarea>
          <button type="submit" class="primary-btn">Send Message</button>
        </form>
      </div>
    </section>

    <footer class="site-footer">
      <div class="wrapper site-footer__layout">
        <p>&copy; 2025 Skillora. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
